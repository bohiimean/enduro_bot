services:
  bot:
    build: .
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      - CHROME_BINARY_PATH=/usr/bin/chromium
    volumes:
      - ./credentials.json:/app/credentials.json:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
